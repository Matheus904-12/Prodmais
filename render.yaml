services:
  - type: web
    name: prodmais-umc
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # MySQL — preencher com dados do banco gerenciado (ex: Aiven, Railway, PlanetScale)
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_DB
        value: prodmais_umc
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASS
        sync: false
      # Elasticsearch — usar Bonsai.io free tier ou deixar vazio (fallback MySQL)
      # Formato: "meu-cluster.searchly.com:9200" ou vazio para desabilitar ES
      - key: ES_HOST
        value: ""
      # URL pública do deploy (preencher após criar o serviço no Render)
      - key: APP_URL
        sync: false
      # Admin
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECURE
        value: "true"
    healthCheckPath: /api/health.php
    autoDeploy: true
