name: CI — Prodmais UMC

on:
  push:
    branches: [main, xmlprod]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint e validação de sintaxe PHP
  # ─────────────────────────────────────────────────────────────
  php-lint:
    name: PHP Lint (sintaxe)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, curl, zip

      - name: Verificar sintaxe de todos os arquivos PHP
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors"

      - name: Instalar dependências Composer
        run: composer install --no-dev --prefer-dist --no-interaction

  # ─────────────────────────────────────────────────────────────
  # Job 2: Segurança — verificar segredos expostos
  # ─────────────────────────────────────────────────────────────
  security-check:
    name: Verificar segredos expostos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Garantir que .env.production não está no repositório
        run: |
          if git ls-files | grep -q "\.env\.production$"; then
            echo "ERRO: .env.production está sendo rastreado pelo git!"
            echo "Execute: git rm --cached .env.production"
            exit 1
          fi
          echo "OK: .env.production não está no repositório"

      - name: Verificar credenciais hardcoded em PHP
        run: |
          # Alertar se password em string literal (fora de config.example)
          FOUND=$(grep -rn "password\s*=\s*['\"][^$]" --include="*.php" \
            --exclude="config.example.php" \
            --exclude="schema_auth.sql" \
            --exclude-dir=vendor . | grep -v "password_hash\|password_verify\|PASSWORD_BCRYPT" || true)
          if [ -n "$FOUND" ]; then
            echo "Aviso: possíveis credenciais hardcoded encontradas:"
            echo "$FOUND"
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 3: Testes E2E Cypress (apenas em PR para main)
  # ─────────────────────────────────────────────────────────────
  cypress:
    name: Testes E2E (Cypress)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: prodmais_umc
          MYSQL_USER: prodmais
          MYSQL_PASSWORD: prodmais123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Instalar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, xml, curl, zip, sqlite3

      - name: Instalar dependências PHP
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Inicializar schema do banco
        run: |
          mysql -h 127.0.0.1 -u root -proot prodmais_umc < sql/schema.sql
          mysql -h 127.0.0.1 -u root -proot prodmais_umc < sql/schema_auth.sql
        env:
          MYSQL_HOST: "127.0.0.1"

      - name: Criar diretórios de runtime
        run: |
          mkdir -p data/uploads data/logs data/cache data/lattes_xml data/backups

      - name: Iniciar servidor PHP built-in
        run: |
          MYSQL_HOST=127.0.0.1 MYSQL_DB=prodmais_umc MYSQL_USER=root MYSQL_PASS=root \
          php -S 127.0.0.1:8080 -t public &
          sleep 3

      - name: Instalar Node.js e Cypress
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências npm
        run: npm ci

      - name: Rodar testes Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headless: true
        env:
          CYPRESS_baseUrl: http://127.0.0.1:8080

      - name: Fazer upload de screenshots em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
