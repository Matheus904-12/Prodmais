# Configuração de Produção - Prodmais
# Otimizado para performance e segurança (sem bind mounts locais)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    # Em produção o código já está na imagem (COPY no Dockerfile);
    # sem !override aqui o bind mount '.' do dev entraria junto (merge concatena arrays)
    volumes: !override
      - app_data:/var/www/html/data
    ports: !override []
    restart: always

  elasticsearch:
    environment:
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g" # Mais memória em produção
    restart: always

  db:
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: prodmais_caddy
    restart: always
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - prodmais

volumes:
  app_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
