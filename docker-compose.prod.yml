# Configuração Docker Prodmais UMC - PRODUÇÃO OCI

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: prodmais_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:-prodmais_root_secure}
      MYSQL_DATABASE: ${MYSQL_DB:-prodmais_umc}
      MYSQL_USER: ${MYSQL_USER:-prodmais_admin}
      MYSQL_PASSWORD: ${MYSQL_PASS:-prodmais_pass_secure}
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - prodmais_prod

  # Elasticsearch (Otimizado para OCI Always Free - 1GB Heap)
  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: prodmais_elasticsearch_prod
    restart: always
    environment:
      - node.name=prodmais-es
      - cluster.name=prodmais-prod
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
    volumes:
      - es_prod_data:/usr/share/elasticsearch/data
    networks:
      - prodmais_prod

  # PHP/Apache (App Principal)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prodmais_web_prod
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./data:/var/www/html/data
      - ./logs:/var/www/html/logs
    environment:
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - MYSQL_HOST=db
      - MYSQL_DB=${MYSQL_DB:-prodmais_umc}
      - MYSQL_USER=${MYSQL_USER:-prodmais_admin}
      - MYSQL_PASS=${MYSQL_PASS:-prodmais_pass_secure}
    depends_on:
      - db
      - elasticsearch
    networks:
      - prodmais_prod

volumes:
  mysql_prod_data:
  es_prod_data:

networks:
  prodmais_prod:
    driver: bridge
