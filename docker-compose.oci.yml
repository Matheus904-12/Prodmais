# docker-compose para OCI Always Free (4 vCPU ARM + 24 GB RAM)
# Uso: docker compose -f docker-compose.oci.yml up -d

services:

  db:
    image: mysql:8.0
    container_name: prodmais_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:?Defina MYSQL_ROOT_PASS no .env}
      MYSQL_DATABASE:      ${MYSQL_DB:-prodmais_umc}
      MYSQL_USER:          ${MYSQL_USER:-prodmais}
      MYSQL_PASSWORD:      ${MYSQL_PASS:?Defina MYSQL_PASS no .env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/schema_auth.sql:/docker-entrypoint-initdb.d/02_schema_auth.sql
    networks:
      - prodmais
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASS}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: prodmais_es
    restart: always
    environment:
      - node.name=prodmais-es
      - cluster.name=prodmais
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - prodmais
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prodmais_web
    restart: always
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - app_data:/var/www/html/data
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:8080}
      - MYSQL_HOST=db
      - MYSQL_DB=${MYSQL_DB:-prodmais_umc}
      - MYSQL_USER=${MYSQL_USER:-prodmais}
      - MYSQL_PASS=${MYSQL_PASS}
      - ES_HOST=elasticsearch:9200
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Defina ADMIN_PASSWORD no .env}
      - SESSION_SECURE=${SESSION_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - prodmais
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/health.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mysql_data:
  elasticsearch_data:
  app_data:

networks:
  prodmais:
    driver: bridge
